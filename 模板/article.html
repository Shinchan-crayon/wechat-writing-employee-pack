<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { max-width:680px; margin:0 auto; padding:20px; font-family:-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
h1.h1title { font-size:18px; color:#333; text-align:center; margin:0; padding:0; font-weight:bold; }
.abstract { text-align:center; color:#666; font-size:15px; margin:12px 0 24px; line-height:1.6; }
p { font-size:17px; color:#3f3f3f; line-height:1.6; letter-spacing:0.05em; margin:0 0 1.5em; }
.hl { color:#8B2E2E; font-weight:bold; }
.titlestyle { text-align:center; margin:24px 0; }
.titlestyle span { color:#fff; background:#8B2E2E; padding:6px 24px; border-radius:50px; font-size:18px; font-weight:bold; display:inline-block; }
</style>
</head>
<body>

<h1 class="h1title">文章标题</h1>

<p class="abstract">文章摘要</p>

<p>正文第一段，每段最多两句，陈述句结尾不用句号</p>
<p>第二段内容。关键词用<span class="hl">高亮标红</span></p>

<div class="titlestyle"><span>第一节标题</span></div>

<p>第一节正文</p>

<div class="titlestyle"><span>第二节标题</span></div>

<p>第二节正文</p>

<div class="titlestyle"><span>第三节标题</span></div>

<p>第三节正文</p>

<p>结尾段。你怎么看，XXXX？</p>

</body>
</html>

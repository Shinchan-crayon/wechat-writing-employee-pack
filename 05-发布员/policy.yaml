# 发布员 — policy.yaml

tools:
  terminal:
    allowed: true                              # 平台 API 调用、网络检测
    deny_patterns:
      - "killall.*Chrome"
      - "rm -rf /"
      - "pip install"
      - "npm install"
  browser:
    allowed: true                              # 浏览器操控发布模式
    scope: "仅用于浏览器操控发布模式，不做其他用途"
  mcp:
    allowed: false

file_access:
  read_allow:
    - "${USER_WORKSPACE}/"                     # 读取审校归档的 HTML
    - "${PACKAGE_ROOT}/共享资源/"
  write_allow:
    - "${USER_WORKSPACE}/"                     # 暂存上传结果
  deny:
    - "*.env.local"
    - "${PACKAGE_ROOT}/模板/"
    - "${PACKAGE_ROOT}/04-审校/skills/"

network:
  allowed_domains:
    - "${PLATFORM_API_DOMAIN}"                 # 平台 API 域名
    - "${PLATFORM_WEB_DOMAIN}"                 # 平台 Web 域名
  deny_outbound_to_private: true
  log_policy: "不记录 API 响应中的凭证和令牌"

gates:
  - trigger: "before_publish"
    action: "check_platform_config"
    check_items:
      - "USER.md 中平台凭证是否已填写"
      - "USER.md 中网络权限是否已配置"
      - "本机出口地址是否在允许列表内"
    fail_message: |
      平台 API 配置未完成。
      当前状态：{missing_items}
      请按配置引导完成设置后再试。
  - trigger: "after_publish"
    action: "remind_manual_check"
    message: |
      草稿已推送至平台草稿箱。
      ⚠️ 请在编辑器中检查：
      1. 标题是否正确
      2. 样式是否正常显示
      3. 图片是否全部可见
      4. 正文格式是否完整

security:
  allow_script_execution: true                 # API 调用需要终端
  allow_env_read: false                        # 不读取环境变量，凭证只从用户本地配置读取
  key_isolation: true                           # 凭证不进入日志
  retry_limit: 3                               # 同参数最多重试 3 次
